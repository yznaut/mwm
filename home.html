<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<title>Movie Watchlist Manager</title>
</head>
<body>

<div class="sidebar">
<button onclick="show('home',this)" class="active">Home</button>
<button onclick="show('profile',this)">Profile</button>
<button onclick="show('about',this)">About</button>
</div>

<div class="topbar">
<img src="logo.png">
<b>Movie Watchlist Manager</b>
</div>

<div class="main">

<div id="home">
<h3>Currently Watching</h3>
<input id="t" placeholder="Title">
<input id="g" placeholder="Genre (optional)">
<input id="d" type="date">
<button onclick="add()">Add</button>
<div id="watching"></div>

<h3>Watched</h3>
<div id="watched"></div>
</div>

<div id="profile" style="display:none;">
<h3>Profile</h3>
<p id="user"></p>
<button onclick="logout()">Logout</button>
</div>

<div id="about" style="display:none;">
<h3>About</h3>
<p>Movie Watchlist Manager system</p>
<p>Developers: Your Group</p>
</div>

<script src="home.js"></script>
</div>
</body>
</html>
